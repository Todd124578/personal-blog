backend:
  name: github
  repo: Todd124578/personal-blog
  branch: main
  use_graphql: true

media_folder: public/uploads
public_folder: /uploads

publish_mode: editorial_workflow

collections:
  - name: settings
    label: 站点设置
    files:
      - name: site
        label: 首页与站点信息
        file: src/content/settings.json
        fields:
          - { label: 名称, name: name, widget: string }
          - { label: 站点标题, name: title, widget: string }
          - { label: Slogan, name: slogan, widget: string }
          - { label: 描述, name: description, widget: text }
          - { label: 头像, name: avatar, widget: image, required: false }
          - { label: 首页大图, name: heroImage, widget: image, required: false }
          - { label: 主题色, name: accentColor, widget: string }
          - label: 社交链接
            name: socialLinks
            widget: list
            fields:
              - { label: 显示文字, name: label, widget: string }
              - { label: 链接, name: href, widget: string }
          - label: 社群/联系入口
            name: communityLinks
            widget: list
            fields:
              - { label: 显示文字, name: label, widget: string }
              - { label: 链接, name: href, widget: string }

  - name: posts
    label: 文章
    folder: src/content/posts
    create: true
    extension: json
    format: json
    slug: "{{slug}}"
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 路径, name: slug, widget: string, hint: "英文、数字和连字符，例如 my-first-post" }
      - label: 状态
        name: status
        widget: select
        options:
          - { label: 草稿, value: draft }
          - { label: 发布, value: published }
      - { label: 发布时间, name: publishedAt, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { label: 封面图, name: coverImage, widget: image, required: false }
      - { label: 摘要, name: summary, widget: text }
      - label: 分类
        name: category
        widget: relation
        collection: categories
        search_fields: [title]
        value_field: slug
        display_fields: [title]
      - label: 标签
        name: tags
        widget: relation
        collection: tags
        search_fields: [title]
        value_field: slug
        display_fields: [title]
        multiple: true
        required: false
      - { label: 正文, name: body, widget: markdown }
      - { label: SEO 标题, name: seoTitle, widget: string, required: false }
      - { label: SEO 描述, name: seoDescription, widget: text, required: false }
      - { label: 首页精选, name: featured, widget: boolean, default: false }
      - { label: 阅读时长, name: readingTime, widget: string, default: "5 min" }

  - name: categories
    label: 分类
    folder: src/content/categories
    create: true
    extension: json
    format: json
    slug: "{{slug}}"
    fields:
      - { label: 名称, name: title, widget: string }
      - { label: 路径, name: slug, widget: string }
      - { label: 描述, name: description, widget: text }
      - { label: 强调色, name: accentColor, widget: string, default: "#39ffb6" }

  - name: tags
    label: 标签
    folder: src/content/tags
    create: true
    extension: json
    format: json
    slug: "{{slug}}"
    fields:
      - { label: 名称, name: title, widget: string }
      - { label: 路径, name: slug, widget: string }

  - name: projects
    label: 项目/作品
    folder: src/content/projects
    create: true
    extension: json
    format: json
    slug: "{{slug}}"
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 路径, name: slug, widget: string }
      - { label: 封面图, name: coverImage, widget: image, required: false }
      - { label: 摘要, name: summary, widget: text }
      - { label: 外部链接, name: externalUrl, widget: string, required: false }
      - { label: 正文, name: body, widget: markdown, required: false }

  - name: friends
    label: 友链
    folder: src/content/friends
    create: true
    extension: json
    format: json
    slug: "{{name}}"
    fields:
      - { label: 名称, name: name, widget: string }
      - { label: 头像, name: avatar, widget: image, required: false }
      - { label: 网站链接, name: siteUrl, widget: string }
      - { label: 描述, name: description, widget: text }

  - name: media
    label: 书单/影单
    folder: src/content/media
    create: true
    extension: json
    format: json
    slug: "{{title}}"
    fields:
      - label: 类型
        name: type
        widget: select
        options:
          - { label: 书籍, value: book }
          - { label: 影像, value: movie }
      - { label: 标题, name: title, widget: string }
      - { label: 封面图, name: coverImage, widget: image, required: false }
      - { label: 作者/主创, name: creator, widget: string }
      - { label: 链接, name: link, widget: string, required: false }
      - { label: 评分, name: rating, widget: number, required: false }
      - { label: 笔记, name: notes, widget: text }

  - name: guestbook
    label: 留言
    folder: src/content/guestbook
    create: true
    extension: json
    format: json
    slug: "{{name}}-{{year}}{{month}}{{day}}{{hour}}{{minute}}{{second}}"
    fields:
      - { label: 名称, name: name, widget: string }
      - { label: 留言, name: message, widget: text }
      - { label: 链接, name: link, widget: string, required: false }
      - { label: 创建时间, name: createdAt, widget: datetime }
      - { label: 显示在网站上, name: approved, widget: boolean, default: false }
